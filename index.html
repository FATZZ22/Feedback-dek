<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FatzzStore Feedback</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top left,#3c1e8f,#0b132b);
}

.card{

width:360px;
padding:25px;
border-radius:20px;
background:rgba(20,25,40,0.9);
backdrop-filter: blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
color:white;
text-align:center;

}

.logo{

width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-top:-70px;
border:4px solid rgba(255,255,255,0.2);

}

.title{

font-size:26px;
font-weight:bold;
margin-top:10px;

}

.subtitle{

font-size:13px;
opacity:0.7;
margin-bottom:15px;

}

.tabs{

display:flex;
gap:10px;
margin-bottom:15px;

}

.tab{

flex:1;
padding:8px;
border-radius:20px;
border:none;
cursor:pointer;
background:linear-gradient(90deg,#6a5cff,#39c6ff);
color:white;

}

textarea{

width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
background:#111827;
color:white;
margin-top:10px;

}

.file{

margin-top:10px;
font-size:13px;

}

.send{

width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:20px;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#7b2ff7,#00c6ff);
color:white;

}

</style>
</head>

<body>

<div class="card">

<img src="logo.jpg" class="logo">

<div class="title">FatzzStore</div>
<div class="subtitle">Kirim pesan dan foto dengan cepat tanpa login.</div>

<div class="tabs">
<button class="tab">Kirim Feedback</button>
<button class="tab" style="background:#1f2937">Feedback Saya</button>
</div>

<textarea id="message" placeholder="Tulis feedback kamu di sini..."></textarea>

<div class="file">
<input type="file">
</div>

<button class="send" onclick="sendEmail()">Kirim Feedback</button>

</div>

<script>

(function(){
emailjs.init("afSPNKRU34TPGiBzb");
})();

function sendEmail(){

let message=document.getElementById("message").value;

if(message===""){
alert("Pesan kosong!");
return;
}

emailjs.send("service_42zkw5q","template_2t1eni9",{
message:message
})

.then(function(){
alert("Feedback berhasil dikirim!");
document.getElementById("message").value="";
})

.catch(function(){
alert("Gagal mengirim!");
});

}

</script>

</body>
</html>
